<svg width="1400" height="800" viewBox="0 0 1400 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="800" rx="36" fill="#020617"/>
  <rect x="70" y="80" width="1260" height="640" rx="28" fill="#0F172A" stroke="#1E293B" stroke-width="2"/>
  <text x="100" y="150" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Production Flow</text>
  <text x="100" y="190" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="22">A resilient path from scan capture to reconciliation</text>

  <rect x="110" y="250" width="230" height="140" rx="24" fill="#1E293B" stroke="#38BDF8" stroke-width="2"/>
  <text x="150" y="300" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">1. Scan</text>
  <text x="150" y="336" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Operator advances bundle</text>

  <rect x="390" y="250" width="230" height="140" rx="24" fill="#1E293B" stroke="#22C55E" stroke-width="2"/>
  <text x="430" y="300" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">2. Queue</text>
  <text x="430" y="336" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Pending scan stored locally</text>

  <rect x="670" y="250" width="230" height="140" rx="24" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
  <text x="710" y="300" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">3. Sync</text>
  <text x="710" y="336" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Replay when network returns</text>

  <rect x="950" y="250" width="230" height="140" rx="24" fill="#1E293B" stroke="#A78BFA" stroke-width="2"/>
  <text x="990" y="300" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">4. Review</text>
  <text x="990" y="336" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Flag anomalies for review</text>

  <path d="M340 320H390" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M620 320H670" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M900 320H950" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>

  <rect x="180" y="470" width="1040" height="160" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="220" y="530" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Why it matters</text>
  <text x="220" y="570" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="20">No scan is lost, no production state is overwritten by race conditions, and supervisors can inspect anomalies safely.</text>
</svg>
